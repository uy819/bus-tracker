name: バス到着時刻記録（89番糸満線上り）

on:
  schedule:
    # JST 7:30〜9:30（UTC 22:30〜0:30）を30分ごとに起動
    - cron: '30 22 * * 1-5'   # JST 07:30 （月〜金）
    - cron: '0 23 * * 1-5'    # JST 08:00 （月〜金）
    - cron: '30 23 * * 1-5'   # JST 08:30 （月〜金）
    - cron: '0 0 * * 2-6'     # JST 09:00 （月〜金）
    - cron: '30 0 * * 2-6'    # JST 09:30 （月〜金）
  workflow_dispatch:           # 手動実行ボタン（テスト用）

# 同時実行を1つに制限
concurrency:
  group: bus-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 29
    # リポジトリへの書き込み権限を付与
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト（既存CSVも含む）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 全履歴を取得してpushエラーを防ぐ

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリインストール
        run: pip install requests beautifulsoup4

      - name: バス到着記録を実行
        run: python -u bus_tracker_final.py
        env:
          TZ: Asia/Tokyo

      - name: CSVをリポジトリにコミット（追記蓄積）
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add bus_arrival_log.csv || true
          git diff --staged --quiet || \
            git commit -m "🚌 バス到着記録 $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')"
          git push || true
